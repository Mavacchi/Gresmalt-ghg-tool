name: Build site

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'src/**'
      - 'test/**'
      - 'sql/**'
      - 'package.json'
      - 'build.mjs'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Lint sources for dangerouslySetInnerHTML
        run: npm run lint:no-dangerous-html

      - name: ESLint
        # Soglia max 50 warnings nel package.json. Errori bloccano sempre.
        # Le rules in .eslintrc.json prevengono eval/Function/innerHTML
        # nuovi (defense in depth XSS) + flag warnings su unused vars,
        # console.log accidentali, ==/!= weak.
        run: npm run lint

      # Defense-in-depth: blocca il build se nei sorgenti finisce un
      # secret accidentalmente. Pattern minimi (anon key Supabase JWT,
      # service_role hint, password literali) — il check completo va
      # fatto via tooling esterno (truffleHog/gitleaks) ma questo
      # ferma i casi più ovvi nella PR.
      - name: Secret scan (sources)
        run: |
          set -e
          # Pattern stringenti — i match veri scattano solo su VALORI
          # reali (non placeholder `<...>` o `__VAR__` o esempio):
          #   - JWT che inizia con eyJhbGciOiJIUzI1NiIs (header HS256)
          #   - service_role.* = <jwt>
          #   - SUPABASE_DB_URL=postgres://... con credenziali
          #   - SNAPSHOT_HMAC_KEY=[hex 32+ caratteri]
          if grep -rEn --include='*.js' --include='*.jsx' --include='*.ts' --include='*.mjs' \
              -e 'eyJhbGciOiJIUzI1NiIs[A-Za-z0-9._-]{40,}' \
              -e 'service_role[^a-zA-Z0-9_].{0,80}eyJ' \
              -e 'SUPABASE_DB_URL[ =:][^<].{0,8}postgres://' \
              -e 'SNAPSHOT_HMAC_KEY[ =:][a-fA-F0-9]{32,}' \
              src/ supabase/ test/ build.mjs; then
            echo '::error::Possibile secret nei sorgenti — verifica i match qui sopra'
            exit 1
          fi

      - name: npm audit (alta + critica)
        # `--audit-level=high` ignora low/moderate. Falla se trova
        # CVE high/critical sulle dipendenze pinnate.
        run: npm audit --audit-level=high --omit=dev || (echo '::warning::npm audit ha segnalato vulnerabilità — verifica e aggiorna pacchetti'; exit 0)

      - name: Unit tests (calc + io.enrichForUpsert + zip + redactPII)
        run: npm test

      - name: Build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # Preferenza nuovo nome con fallback legacy (vedi deploy.yml)
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_ANON_KEY }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          SCHEMA_VERSION: '1'
          COMPANY_LEGAL_NAME: 'Gruppo Ceramiche Gresmalt S.p.A.'
          COMPANY_VAT: 'IT00000000000'
          SUSTAINABILITY_EMAIL: 'sustainability@gresmalt.it'
          PUBLIC_DASHBOARD_URL: 'https://sustainability.gresmalt.it'
        run: node build.mjs

      - name: Upload site
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Smoke test runtime (Playwright). Job separato perché:
  # 1. Richiede chromium binary (~150 MB)
  # 2. Più lento di unit test (~30-60s in più)
  # 3. Se fallisce non blocca il build, ma flagga il problema
  #
  # Cattura bug runtime tipo ReferenceError mascherati da split di file
  # (vedi PR #31, #32, #34 — 3 bug consecutivi sfuggiti a unit test +
  # ESLint per IIFE separati).
  # ────────────────────────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install npm deps
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      # Cache dei browser Playwright per velocizzare run successivi
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Build con env stub: i test usano un mock di window.supabase
      # iniettato via addInitScript (no fetch reale verso Supabase)
      - name: Build site (stub env)
        env:
          SUPABASE_URL: 'https://stub.supabase.co'
          SUPABASE_PUBLISHABLE_KEY: 'sb_publishable_stub_for_e2e'
        run: node build.mjs

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
