name: Weekly DB backup

on:
  schedule:
    # lunedì 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install pg_dump 17 (Supabase usa Postgres 17)
        # Il postgresql-client di Ubuntu 24.04 è 16.x e pg_dump 16 aborta
        # contro PG 17 ("server version mismatch"). Installiamo dal repo PGDG
        # e forziamo PATH al binario 17 (il wrapper Debian /usr/bin/pg_dump
        # continua altrimenti a invocare il 16 preinstallato sul runner).
        run: |
          set -e
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -qq -y postgresql-client-17 gnupg
          # Mette /usr/lib/postgresql/17/bin in cima al PATH per gli step
          # successivi, bypassando il wrapper /usr/bin/pg_dump del 16.
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          echo "=== Diagnostica versioni installate ==="
          ls -la /usr/lib/postgresql/*/bin/pg_dump || true
          echo "=== Wrapper /usr/bin/pg_dump ==="
          /usr/bin/pg_dump --version || true
          echo "=== Binario 17 esplicito ==="
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret mancante. Configurarlo su Settings → Secrets and variables → Actions con la connection string del Session Pooler (porta 5432)."
            exit 1
          fi
          stamp=$(date -u +%Y%m%d_%H%M)
          out="ghg_dump_${stamp}.sql"
          # Retry su transient network/pooler errors (3 tentativi, backoff 5s/10s)
          for attempt in 1 2 3; do
            rm -f "$out"
            if pg_dump --no-owner --no-privileges --clean "$DATABASE_URL" > "$out"; then
              echo "✓ Dump completato al tentativo $attempt ($(wc -c < "$out") bytes)"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::pg_dump fallito dopo 3 tentativi"
              exit 1
            fi
            echo "::warning::pg_dump fallito al tentativo $attempt, retry tra $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          gzip -9 "$out"
          ls -la
          echo "ARCHIVE=${out}.gz" >> $GITHUB_ENV

      - name: Encrypt artifact (AES-256)
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -e
          if [ -z "$BACKUP_PASSPHRASE" ]; then
            echo "::error::BACKUP_PASSPHRASE secret missing"
            exit 1
          fi
          gpg --batch --yes --symmetric --cipher-algo AES256 \
              --passphrase "$BACKUP_PASSPHRASE" "$ARCHIVE"
          rm -f "$ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghg-dump-${{ github.run_number }}
          path: '*.gpg'
          retention-days: 30

      # Opzionale (raccomandato): replica off-GitHub. Se i secrets
      # AWS_S3_BACKUP_BUCKET + AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
      # sono presenti, copia il file cifrato su S3 (o storage compatibile)
      # per non avere il backup come Single Point of Failure su GitHub.
      # Lo step è no-op se i secrets mancano (skip + warning).
      - name: Replicate to S3 (off-GitHub)
        env:
          AWS_S3_BACKUP_BUCKET: ${{ secrets.AWS_S3_BACKUP_BUCKET }}
          AWS_ACCESS_KEY_ID:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION || 'eu-central-1' }}
        if: ${{ env.AWS_S3_BACKUP_BUCKET != '' }}
        run: |
          set -e
          if [ -z "${AWS_S3_BACKUP_BUCKET}" ]; then
            echo "::warning::AWS_S3_BACKUP_BUCKET non configurato — backup vive solo su GitHub Actions artifact (max 30 gg)."
            exit 0
          fi
          # awscli preinstallato sui runner ubuntu-latest
          for f in *.gpg; do
            aws s3 cp "$f" "s3://${AWS_S3_BACKUP_BUCKET}/$(date -u +%Y/%m)/$f" \
              --sse AES256 --acl bucket-owner-full-control
          done
          echo "✓ Backup replicato su s3://${AWS_S3_BACKUP_BUCKET}/"
